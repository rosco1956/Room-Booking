<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Booking</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F7F5F0;color:#1A1814;min-height:100vh;padding:20px 16px;}
button{font-family:inherit;cursor:pointer;}
.pr{display:flex;gap:4px;background:#EDEAE4;border:1px solid #E5E0D8;border-radius:99px;padding:3px;}
.p{padding:6px 14px;border-radius:99px;border:none;background:transparent;font-size:13px;color:#8A8479;}
.p.on{background:#1A1814;color:#fff;font-weight:500;}
.tb-bar{display:flex;border-bottom:1px solid #E5E0D8;margin-bottom:16px;max-width:700px;margin-left:auto;margin-right:auto;}
.tb{flex:1;padding:9px 8px;border:none;background:none;font-size:14px;color:#8A8479;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;}
.tb.on{color:#1A1814;border-bottom-color:#1A1814;font-weight:500;}
.card{background:#fff;border:1px solid #E5E0D8;border-radius:14px;padding:18px;}
.inp{width:100%;padding:10px 12px;border:1px solid #E5E0D8;border-radius:8px;font-family:inherit;font-size:14px;color:#1A1814;background:#F7F5F0;outline:none;-webkit-appearance:none;}
.inp:focus{border-color:#C9A84C;}
.lbl{display:block;font-size:11px;font-weight:500;color:#8A8479;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.btn-main{width:100%;padding:12px;background:#1A1814;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;}
.fm{padding:9px 12px;border-radius:8px;font-size:13px;margin-bottom:10px;display:none;}
.fm.e{background:#FDECEA;color:#C0392B;}
.fm.ok{background:#D8F3DC;color:#1B4332;}
.nr{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.ar{width:32px;height:32px;border-radius:50%;border:1px solid #E5E0D8;background:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;color:#1A1814;cursor:pointer;}
.plbl{font-size:14px;font-weight:500;flex:1;text-align:center;}
.td-btn{padding:0 12px;height:32px;border-radius:99px;border:1px solid #E5E0D8;background:#fff;font-size:12px;font-weight:500;color:#1A1814;cursor:pointer;}
.sd{width:7px;height:7px;border-radius:50%;background:#95D5B2;flex-shrink:0;}
.sd.go{background:#C9A84C;animation:pu 1s infinite;}
.sd.no{background:#C0392B;}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}
.who-btn{padding:14px 10px;border-radius:10px;border:2px solid #E5E0D8;background:none;font-size:15px;font-weight:500;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;width:100%;}
/* week */
.wk-w{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid #E5E0D8;border-radius:14px;background:#fff;}
.wk-g{display:grid;grid-template-columns:38px repeat(7,minmax(60px,1fr));min-width:500px;}
.wk-ch{background:#F7F5F0;padding:7px 3px;text-align:center;border-bottom:2px solid #E5E0D8;border-right:1px solid #E5E0D8;}
.wk-ch:last-child{border-right:none;}
.wk-tc{height:48px;background:#F7F5F0;border-right:1px solid #E5E0D8;border-bottom:1px solid #F0EDE8;display:flex;align-items:flex-start;padding:3px 4px 0;font-size:9px;color:#8A8479;}
.wk-cell{position:relative;height:48px;border-right:1px solid #E5E0D8;border-bottom:1px solid #F0EDE8;}
.wk-cell:last-child{border-right:none;}
.wk-ev{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 4px;font-size:10px;font-weight:500;overflow:hidden;line-height:1.3;}
/* month */
.mo-w{border:1px solid #E5E0D8;border-radius:14px;overflow:hidden;background:#fff;}
.mo-h{display:grid;grid-template-columns:repeat(7,1fr);background:#F7F5F0;border-bottom:1px solid #E5E0D8;}
.mo-hc{padding:7px 3px;text-align:center;font-size:10px;font-weight:600;color:#8A8479;text-transform:uppercase;border-right:1px solid #E5E0D8;}
.mo-hc:last-child{border-right:none;}
.mo-b{display:grid;grid-template-columns:repeat(7,1fr);}
.mo-c{border-right:1px solid #E5E0D8;border-bottom:1px solid #E5E0D8;padding:5px 4px;min-height:76px;background:#fff;}
.mo-c:nth-child(7n){border-right:none;}
.mo-c.tdc{background:#FAFAF7;}
.mo-ev{border-radius:4px;padding:2px 5px;font-size:10px;font-weight:500;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@media(max-width:480px){.mo-c{min-height:54px;}.mo-ev{font-size:9px;}}
/* layout */
.wrap{max-width:700px;margin:0 auto;}
@media(min-width:700px){
  .dg{display:grid;grid-template-columns:280px 1fr;gap:20px;align-items:start;max-width:980px;margin:0 auto;}
  .tb-bar,.hdr{max-width:980px;}
}
</style>
</head>
<body>

<div id="who-screen" style="display:none;">
  <div class="card" style="max-width:420px;margin:0 auto;">
    <div style="font-size:20px;font-weight:500;margin-bottom:6px;">Who are you?</div>
    <p style="font-size:13px;color:#8A8479;margin-bottom:16px;">Tap your name — this device will remember you.</p>
    <div id="who-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:8px;"></div>
  </div>
</div>

<div id="loading-screen" style="text-align:center;padding:60px 20px;">
  <div style="display:inline-flex;align-items:center;gap:8px;font-size:14px;color:#8A8479;">
    <div class="sd go"></div>Connecting…
  </div>
</div>

<div id="main-app" style="display:none;">

  <div class="hdr" style="max-width:700px;margin:0 auto 16px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div>
      <div style="font-size:22px;font-weight:500;">Room Booking</div>
      <div style="font-size:11px;color:#8A8479;margin-top:2px;">Rosswell · Donna · Helen</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:#8A8479;">
        <div class="sd" id="sd"></div><span id="sl">—</span>
      </div>
      <span id="yp" style="font-size:13px;font-weight:500;padding:5px 12px;border-radius:99px;border:2px solid transparent;"></span>
      <span onclick="showWho()" style="font-size:12px;color:#8A8479;text-decoration:underline;cursor:pointer;">change</span>
    </div>
  </div>

  <div class="tb-bar">
    <button class="tb on" id="tb-book"   onclick="goTab('book')">📅 Book</button>
    <button class="tb"    id="tb-view"   onclick="goTab('view')">🗂 Bookings</button>
    <button class="tb"    id="tb-people" onclick="goTab('people')">👥 People</button>
  </div>

  <div class="dg">

    <div id="pane-book">
      <div class="card">
        <div style="font-size:17px;font-weight:500;margin-bottom:14px;">New booking</div>
        <div class="fm e" id="ferr"></div>
        <div class="fm ok" id="fok">Booking added ✓</div>
        <div style="margin-bottom:10px;"><label class="lbl" for="fdt">Date</label><input class="inp" type="date" id="fdt"/></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;">
          <div><label class="lbl" for="ffr">From</label><input class="inp" type="time" id="ffr" value="09:00"/></div>
          <div><label class="lbl" for="fto">Until</label><input class="inp" type="time" id="fto" value="10:00"/></div>
        </div>
        <div style="margin-bottom:12px;"><label class="lbl" for="fnt">Purpose (optional)</label><input class="inp" type="text" id="fnt" placeholder="e.g. Client call…"/></div>
        <button class="btn-main" id="sbtn" onclick="doAdd()">Add booking</button>
      </div>
    </div>

    <div id="pane-view" style="display:none;">
      <div style="display:flex;align-items:center;gap:5px;font-size:12px;color:#8A8479;margin-bottom:12px;">
        <div class="sd" id="sd2"></div><span id="sl2">—</span>
      </div>
      <div class="nr">
        <button class="ar" onclick="shift(-1)" aria-label="Previous">&#8249;</button>
        <span class="plbl" id="plbl">Upcoming</span>
        <button class="ar" onclick="shift(1)" aria-label="Next">&#8250;</button>
        <button class="td-btn" onclick="goToday()">Today</button>
      </div>
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
        <div class="pr">
          <button class="p on" id="vb-list"  onclick="setV('list')">List</button>
          <button class="p"    id="vb-week"  onclick="setV('week')">Week</button>
          <button class="p"    id="vb-month" onclick="setV('month')">Month</button>
        </div>
        <div class="pr">
          <button class="p on" id="ch-all"  onclick="setF('all')">All</button>
          <button class="p"    id="ch-mine" onclick="setF('mine')">Mine</button>
        </div>
      </div>
      <div id="vbody"></div>
      <div style="text-align:center;margin-top:12px;">
        <button onclick="load()" style="padding:7px 18px;font-size:13px;border:1px solid #E5E0D8;border-radius:99px;background:none;color:#8A8479;cursor:pointer;">↻ Refresh</button>
      </div>
    </div>

    <div id="pane-people" style="display:none;">
      <div class="card">
        <div style="font-size:17px;font-weight:500;margin-bottom:12px;">Manage people</div>
        <p style="font-size:13px;color:#8A8479;margin-bottom:14px;">Changes sync to everyone immediately.</p>
        <div id="plist" style="margin-bottom:12px;"></div>
        <div style="display:flex;gap:8px;">
          <input class="inp" type="text" id="pinp" placeholder="Add a name…" aria-label="Add a person" style="flex:1;" onkeydown="if(event.key==='Enter')addP()"/>
          <button onclick="addP()" style="padding:10px 16px;border-radius:8px;background:#1A1814;color:#fff;border:none;font-size:14px;cursor:pointer;">Add</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const GAS='https://script.google.com/macros/s/AKfycbxnNBBioZubr2MY_EfLnywb2sboOF9FX1PFPtagMNSliF-i4Y4QyojNwoOBM42SMDi1/exec';
const PAL=[
  {bg:'#D8F3DC',mid:'#52B788',fg:'#1B4332'},
  {bg:'#EDE7F6',mid:'#9C6BC4',fg:'#3D1C5A'},
  {bg:'#FFF3CD',mid:'#C9A84C',fg:'#6B4C00'},
  {bg:'#FFE5E5',mid:'#E07070',fg:'#7A1C1C'},
  {bg:'#D6EAF8',mid:'#5DADE2',fg:'#1A5276'},
  {bg:'#FDEBD0',mid:'#E59866',fg:'#784212'},
];
const S={
  me:localStorage.getItem('rb_me')||'',
  bookings:[],people:['Rosswell','Donna','Helen'],
  filt:'all',view:'list',cursor:new Date(),tab:'book'
};
function col(n){const i=S.people.indexOf(n);return PAL[(i<0?0:i)%PAL.length];}
function ds(d){return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());}
function p2(n){return String(n).padStart(2,'0');}
function addD(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function wkMon(d){const r=new Date(d);const w=r.getDay();r.setDate(r.getDate()-(w===0?6:w-1));r.setHours(0,0,0,0);return r;}
function xe(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

document.getElementById('fdt').value=ds(new Date());

// Always show the app immediately — don't wait for sync
document.getElementById('loading-screen').style.display='none';
document.getElementById('main-app').style.display='block';
if(!S.me||!S.people.includes(S.me)) showWho();
else applyMe();

// Then try to sync in background
load(true);
setInterval(()=>load(false),15000);

async function load(spin=true){
  if(spin) syncUI(true,'Loading…');
  try{
    const r=await fetch(GAS,{redirect:'follow'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    const rec=j.record||{};
    S.bookings=Array.isArray(rec.bookings)?[...rec.bookings]:[];
    if(Array.isArray(rec.people)&&rec.people.length) S.people=[...rec.people];
    S.bookings.sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));
    syncUI(false,'Synced · '+S.bookings.length+' booking'+(S.bookings.length===1?'':'s'));
    draw(); renderPeople();
    if(document.getElementById('who-screen').style.display==='block') showWho();
  }catch(e){ syncUI(false,'Sync error — '+e.message,true); }
}

async function save(){
  syncUI(true,'Saving…');
  try{
    const encoded=encodeURIComponent(JSON.stringify({bookings:S.bookings,people:S.people}));
    const r=await fetch(GAS+'?action=save&data='+encoded,{redirect:'follow'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    syncUI(false,'Saved · '+S.bookings.length+' booking'+(S.bookings.length===1?'':'s'));
  }catch(e){ syncUI(false,'Save failed — '+e.message,true); }
}

function syncUI(spin,txt,bad){
  ['sd','sd2'].forEach(id=>{const e=document.getElementById(id);if(e)e.className='sd'+(spin?' go':bad?' no':'');});
  ['sl','sl2'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=txt;});
}

function showWho(){
  document.getElementById('who-screen').style.display='block';
  document.getElementById('main-app').style.display='none';
  document.getElementById('who-grid').innerHTML=S.people.map((n,i)=>{
    const c=PAL[i%PAL.length];
    return`<button class="who-btn" onclick="pickMe('${xe(n)}')" style="border-color:${c.mid};">
      <div style="width:14px;height:14px;border-radius:50%;background:${c.mid};"></div>
      <span style="color:${c.fg};">${xe(n)}</span></button>`;
  }).join('');
}
function pickMe(n){
  S.me=n; localStorage.setItem('rb_me',n);
  document.getElementById('who-screen').style.display='none';
  document.getElementById('main-app').style.display='block';
  applyMe();
}
function applyMe(){
  const c=col(S.me);
  const p=document.getElementById('yp');
  p.textContent=S.me; p.style.background=c.bg; p.style.color=c.fg; p.style.borderColor=c.mid;
  document.getElementById('sbtn').style.background=c.fg;
  draw();
}

async function doAdd(){
  if(!S.me){showWho();return;}
  const date=document.getElementById('fdt').value;
  const from=document.getElementById('ffr').value;
  const to=document.getElementById('fto').value;
  const note=document.getElementById('fnt').value.trim();
  const eEl=document.getElementById('ferr'),oEl=document.getElementById('fok');
  eEl.style.display='none'; oEl.style.display='none';
  if(!date||!from||!to){eEl.textContent='Please fill in date and times.';eEl.style.display='block';return;}
  if(from>=to){eEl.textContent='End time must be after start time.';eEl.style.display='block';return;}
  syncUI(true,'Checking…');
  try{
    const r=await fetch(GAS,{redirect:'follow'});
    const j=await r.json(); const rec=j.record||{};
    S.bookings=Array.isArray(rec.bookings)?[...rec.bookings]:[];
  }catch(e){eEl.textContent='Could not verify: '+e.message;eEl.style.display='block';return;}
  const clash=S.bookings.find(b=>b.date===date&&!(to<=b.start||from>=b.end));
  if(clash){eEl.textContent='Clash with '+clash.who+' ('+clash.start+'–'+clash.end+').';eEl.style.display='block';draw();return;}
  S.bookings.push({id:Date.now(),who:S.me,date,start:from,end:to,note});
  S.bookings.sort((a,b)=>(a.date+a.start).localeCompare(b.date+b.start));
  await save();
  document.getElementById('fnt').value='';
  oEl.style.display='block'; setTimeout(()=>oEl.style.display='none',3000);
  draw();
}

async function delB(id){
  if(!confirm('Delete this booking?'))return;
  S.bookings=S.bookings.filter(b=>b.id!==id);
  await save(); draw();
}

async function addP(){
  const inp=document.getElementById('pinp'); const n=inp.value.trim();
  if(!n||S.people.some(p=>p.toLowerCase()===n.toLowerCase())){inp.value='';return;}
  S.people.push(n); inp.value=''; await save(); renderPeople();
}
async function remP(n){
  if(S.people.length<=1)return; if(!confirm('Remove '+n+'?'))return;
  S.people=S.people.filter(p=>p!==n); await save(); renderPeople();
  if(S.me===n){S.me='';localStorage.removeItem('rb_me');showWho();}
}
function renderPeople(){
  const el=document.getElementById('plist'); if(!el)return;
  el.innerHTML=S.people.map((n,i)=>{const c=PAL[i%PAL.length];
    return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #F0EDE8;">
      <div style="width:28px;height:28px;border-radius:50%;background:${c.bg};color:${c.fg};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0;">${xe(n[0])}</div>
      <span style="flex:1;font-size:14px;">${xe(n)}</span>
      <button onclick="remP('${xe(n)}')" style="color:#8A8479;font-size:20px;padding:2px 6px;border:none;background:none;cursor:pointer;">×</button>
    </div>`;
  }).join('');
}

function setF(f){
  S.filt=f;
  document.getElementById('ch-all').className='p'+(f==='all'?' on':'');
  document.getElementById('ch-mine').className='p'+(f==='mine'?' on':'');
  draw();
}
function getFilt(){return S.filt==='mine'?S.bookings.filter(b=>b.who===S.me):[...S.bookings];}

function setV(v){
  S.view=v;
  document.getElementById('vb-list').className='p'+(v==='list'?' on':'');
  document.getElementById('vb-week').className='p'+(v==='week'?' on':'');
  document.getElementById('vb-month').className='p'+(v==='month'?' on':'');
  updateLbl(); draw();
}
function shift(d){
  if(S.view==='list'||S.view==='week') S.cursor=addD(S.cursor,d*7);
  else S.cursor=new Date(S.cursor.getFullYear(),S.cursor.getMonth()+d,1);
  updateLbl(); draw();
}
function goToday(){S.cursor=new Date();updateLbl();draw();}
function updateLbl(){
  const el=document.getElementById('plbl'); if(!el)return;
  if(S.view==='list'){el.textContent='Upcoming';return;}
  if(S.view==='week'){
    const m=wkMon(S.cursor),s=addD(m,6);
    el.textContent=m.toLocaleDateString('en-GB',{day:'numeric',month:'short'})+' – '+s.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
  }else{
    el.textContent=S.cursor.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  }
}
function draw(){
  updateLbl();
  if(S.view==='list') drawList();
  else if(S.view==='week') drawWeek();
  else drawMonth();
}

function drawList(){
  const el=document.getElementById('vbody'); if(!el)return;
  const tod=ds(new Date());
  const fb=getFilt().filter(b=>b.date>=tod);
  if(!fb.length){el.innerHTML='<p style="color:#8A8479;padding:20px 0;text-align:center;">No upcoming bookings'+(S.filt==='mine'?' for you':'')+'</p>';return;}
  const g={};fb.forEach(b=>{if(!g[b.date])g[b.date]=[];g[b.date].push(b);});
  el.innerHTML=Object.keys(g).sort().map(date=>{
    const lbl=date===tod?'Today':new Date(date+'T12:00:00').toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
    const rows=g[date].map(b=>{const c=col(b.who);
      return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-top:1px solid #F0EDE8;border-left:3px solid ${c.mid};">
        <div style="width:34px;height:34px;border-radius:50%;background:${c.bg};color:${c.fg};display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;flex-shrink:0;">${xe(b.who[0].toUpperCase())}</div>
        <div style="flex:1;min-width:0;">
          <div style="font-size:14px;font-weight:500;">${xe(b.who)}</div>
          <div style="font-size:13px;color:#8A8479;">${xe(b.start)} – ${xe(b.end)}${b.note?' · '+xe(b.note):''}</div>
        </div>
        <button onclick="delB(${b.id})" style="color:#CCC;font-size:20px;padding:2px 8px;border:none;background:none;cursor:pointer;flex-shrink:0;">×</button>
      </div>`;
    }).join('');
    return`<div style="margin-bottom:14px;">
      <div style="font-size:11px;font-weight:500;color:#8A8479;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;">${lbl}</div>
      <div style="border:1px solid #E5E0D8;border-radius:12px;overflow:hidden;">${rows}</div>
    </div>`;
  }).join('');
}

function drawWeek(){
  const el=document.getElementById('vbody'); if(!el)return;
  const mon=wkMon(S.cursor);
  const days=Array.from({length:7},(_,i)=>addD(mon,i));
  const tod=ds(new Date());
  const HOURS=Array.from({length:13},(_,i)=>i+7);
  const H=48; const fb=getFilt();
  let html='<div class="wk-w"><div class="wk-g">';
  html+='<div class="wk-ch"></div>';
  days.forEach(d=>{
    const isT=ds(d)===tod;
    const ns=isT?`background:#1A1814;color:#fff;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;margin:2px auto 0;`:`font-size:16px;color:#1A1814;margin-top:2px;`;
    html+=`<div class="wk-ch"><div style="font-size:9px;font-weight:600;color:#8A8479;text-transform:uppercase;">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div><div style="${ns}">${d.getDate()}</div></div>`;
  });
  HOURS.forEach(h=>{
    html+=`<div class="wk-tc">${p2(h)}:00</div>`;
    days.forEach(d=>{
      const dstr=ds(d);
      const evs=fb.filter(b=>b.date===dstr&&parseInt(b.start.split(':')[0])===h);
      html+='<div class="wk-cell">';
      evs.forEach(b=>{
        const[sh,sm]=b.start.split(':').map(Number);
        const[eh,em]=b.end.split(':').map(Number);
        const top=(sm/60)*H;
        const ht=Math.max(((eh*60+em-sh*60-sm)/60)*H,16);
        const c=col(b.who);
        html+=`<div class="wk-ev" style="top:${top}px;height:${ht}px;background:${c.bg};color:${c.fg};border-left:2px solid ${c.mid};"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${xe(b.who)}</div><div style="font-size:8px;opacity:.8;">${xe(b.start)}–${xe(b.end)}</div></div>`;
      });
      html+='</div>';
    });
  });
  html+='</div></div>';
  el.innerHTML=html;
}

function drawMonth(){
  const el=document.getElementById('vbody'); if(!el)return;
  const yr=S.cursor.getFullYear(),mo=S.cursor.getMonth();
  const tod=ds(new Date());
  const first=new Date(yr,mo,1),last=new Date(yr,mo+1,0);
  let off=first.getDay()-1; if(off<0)off=6;
  const cells=[];
  for(let i=0;i<off;i++) cells.push({d:addD(first,-off+i),om:true});
  for(let i=1;i<=last.getDate();i++) cells.push({d:new Date(yr,mo,i),om:false});
  while(cells.length%7) cells.push({d:addD(last,cells.length-off-last.getDate()+1),om:true});
  const fb=getFilt();
  const DAYS=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  let html='<div class="mo-w"><div class="mo-h">';
  DAYS.forEach(d=>html+=`<div class="mo-hc">${d}</div>`);
  html+='</div><div class="mo-b">';
  cells.forEach(({d,om})=>{
    const dstr=ds(d); const isT=dstr===tod;
    const evs=fb.filter(b=>b.date===dstr);
    const show=evs.slice(0,3); const more=evs.length-show.length;
    const numEl=isT
      ?`<div style="background:#1A1814;color:#fff;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;margin-bottom:3px;">${d.getDate()}</div>`
      :`<div style="font-size:12px;margin-bottom:3px;color:${om?'#C8C3BB':'#1A1814'};">${d.getDate()}</div>`;
    html+=`<div class="mo-c${isT?' tdc':''}">`;
    html+=numEl;
    show.forEach(b=>{const c=col(b.who);html+=`<div class="mo-ev" style="background:${c.bg};color:${c.fg};">${xe(b.who)} ${xe(b.start)}</div>`;});
    if(more>0) html+=`<div style="font-size:9px;color:#8A8479;">+${more} more</div>`;
    html+='</div>';
  });
  html+='</div></div>';
  el.innerHTML=html;
}

function goTab(t){
  S.tab=t;
  ['book','view','people'].forEach(k=>{
    document.getElementById('tb-'+k).className='tb'+(k===t?' on':'');
    document.getElementById('pane-'+k).style.display=k===t?'block':'none';
  });
  if(window.innerWidth>=700){
    document.getElementById('pane-book').style.display='block';
    document.getElementById('pane-view').style.display=t==='people'?'none':'block';
    document.getElementById('pane-people').style.display=t==='people'?'block':'none';
  }
  if(t==='view'){load();draw();}
}
window.addEventListener('resize',()=>{
  if(window.innerWidth>=700&&S.tab!=='people'){
    document.getElementById('pane-book').style.display='block';
    document.getElementById('pane-view').style.display='block';
  }
});
updateLbl();
</script>
